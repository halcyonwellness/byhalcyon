<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halcyon</title>
  <meta name="description" content="Halcyon is coming soon." />
  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: #b8c0d9;
      --accent: #9dd6ff;
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(107,170,255,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(119,255,214,0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 40px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(42px, 8vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
    }

    .cta {
      margin-top: 32px;
    }

    .button {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 12px;
      background: #ffffff;
      color: #0b1020;
      text-decoration: none;
      font-weight: 600;
    }

    .footer {
      margin-top: 26px;
      font-size: 14px;
      color: var(--muted);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Coming Soon</div>
    <h1>Halcyon</h1>
    <p>
      A new brand is taking shape. We’re building thoughtful products for better living.
    </p>
    <div class="cta">
      <a class="button" href="mailto:hello@yourdomain.com">Contact Us</a>
    </div>
    <div class="footer">© 2026 Halcyon. All rights reserved.</div>
  </main>
</body>
</html>
