<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halcyon Wellness, Inc.</title>
  <meta name="description" content="Halcyon Wellness, Inc." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #2f68d4;
      --blue-deep: #295ec4;
      --blue-soft: rgba(255,255,255,0.08);
      --text: #f3eee5;
      --line: rgba(243, 238, 229, 0.78);
      --muted: rgba(243, 238, 229, 0.88);
      --shadow: rgba(15, 30, 70, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: #f5f3ee;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      position: relative;
      width: 100%;
      max-width: 1240px;
      min-height: 92vh;
      overflow: hidden;
      border-radius: 26px;
      background:
        radial-gradient(circle at 16% 78%, rgba(255,255,255,0.04), transparent 30%),
        linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
      box-shadow: 0 20px 60px var(--shadow);
    }

    .shell::before {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -120px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
    }

    .shell::after {
      content: "";
      position: absolute;
      left: -36px;
      bottom: -36px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(25, 77, 184, 0.36);
      pointer-events: none;
    }

    .curve-art {
      position: absolute;
      top: -16px;
      right: -14px;
      width: min(47vw, 610px);
      height: auto;
      opacity: 0.92;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 90px;
    }

    .inner {
      max-width: 760px;
    }

    .wordmark-wrap {
      position: relative;
      display: inline-block;
    }

    .wordmark {
      margin: 0;
      display: inline-block;
      white-space: nowrap;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: clamp(64px, 10vw, 96px);
      line-height: 0.94;
      letter-spacing: -0.04em;
      color: var(--text);
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    .wordmark .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(12px);
      filter: blur(5px);
      transition:
        opacity 1500ms cubic-bezier(.2,.8,.2,1),
        transform 1500ms cubic-bezier(.2,.8,.2,1),
        filter 1500ms cubic-bezier(.2,.8,.2,1);
    }

    .wordmark.is-visible .char {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .wordmark-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      white-space: nowrap;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: clamp(64px, 10vw, 96px);
      line-height: 0.94;
      letter-spacing: -0.04em;
      color: transparent;
      background: linear-gradient(
        100deg,
        rgba(255,255,255,0) 18%,
        rgba(255,255,255,0.08) 35%,
        rgba(255,255,255,0.78) 50%,
        rgba(255,255,255,0.10) 65%,
        rgba(255,255,255,0) 82%
      );
      background-size: 220% 100%;
      background-position: 140% 0;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
    }

    .wordmark-glow.is-shimmering {
      animation: shimmerPass 2400ms cubic-bezier(.2,.7,.2,1);
    }

    @keyframes shimmerPass {
      0% {
        opacity: 0;
        background-position: 140% 0;
      }
      14% {
        opacity: 0.92;
      }
      55% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        background-position: -40% 0;
      }
    }

    .rule {
      width: 128px;
      height: 1px;
      margin: 25px auto 25px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      opacity: 0;
      transform: scaleX(0.8);
      transition: opacity 1000ms ease, transform 1000ms ease;
      transition-delay: 1700ms;
    }

    .rule.is-visible {
      opacity: 1;
      transform: scaleX(1);
    }

    .sub {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: normal;
      font-weight: 400;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--muted);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1200ms ease, transform 1200ms ease;
      transition-delay: 1900ms;
    }

    .sub.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 26px;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(243, 238, 229, 0.72);
      opacity: 0;
      transition: opacity 1200ms ease;
      transition-delay: 2400ms;
    }

    .footer.is-visible {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .wordmark .char,
      .rule,
      .sub,
      .footer {
        transition: none;
        opacity: 1;
        transform: none;
        filter: none;
      }

      .wordmark-glow {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .shell {
        min-height: 88vh;
      }

      .content {
        min-height: 88vh;
        padding: 48px 22px 84px;
      }

      .curve-art {
        width: min(58vw, 430px);
      }

      .rule {
        width: 104px;
        margin: 16px auto 16px;
      }

      .footer {
        bottom: 20px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <svg class="curve-art" viewBox="0 0 620 720" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M130 -30C90 40 70 95 78 145C92 231 196 266 327 303C456 340 552 406 598 505C630 574 633 650 624 725"
            stroke="rgba(243,238,229,0.78)" stroke-width="1.2" />
      <path d="M168 -28C127 39 108 93 116 142C129 223 229 260 354 295C481 332 575 401 617 499C647 568 649 644 640 718"
            stroke="rgba(243,238,229,0.78)" stroke-width="1.2" />
      <path d="M208 -26C164 42 145 95 153 140C166 216 261 255 382 289C505 324 598 395 636 494C663 563 664 637 655 710"
            stroke="rgba(243,238,229,0.78)" stroke-width="1.2" />
    </svg>

    <section class="content">
      <div class="inner">
        <div class="wordmark-wrap">
          <h1 class="wordmark" id="wordmark" aria-label="Halcyon"></h1>
          <div class="wordmark-glow" id="wordmarkGlow" aria-hidden="true">Halcyon</div>
        </div>

        <div class="rule" id="rule"></div>
        <div class="sub" id="subline">Bioengineered Liver Health and Wellness</div>
      </div>
    </section>

    <div class="footer" id="footer">© 2026 Halcyon Wellness, Inc.</div>
  </main>

  <script>
    const brand = "Halcyon";
    const wordmark = document.getElementById("wordmark");
    const glow = document.getElementById("wordmarkGlow");
    const subline = document.getElementById("subline");
    const rule = document.getElementById("rule");
    const footer = document.getElementById("footer");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    brand.split("").forEach((letter, index) => {
      const span = document.createElement("span");
      span.className = "char";
      span.textContent = letter;
      span.style.transitionDelay = `${index * 160}ms`;
      wordmark.appendChild(span);
    });

    requestAnimationFrame(() => {
      wordmark.classList.add("is-visible");
      rule.classList.add("is-visible");
      subline.classList.add("is-visible");
      footer.classList.add("is-visible");
    });

    function shimmer() {
      if (reduceMotion) return;
      glow.classList.remove("is-shimmering");
      void glow.offsetWidth;
      glow.classList.add("is-shimmering");
    }

    setTimeout(shimmer, 3400);
    wordmark.addEventListener("mouseenter", shimmer);
  </script>
</body>
</html>
